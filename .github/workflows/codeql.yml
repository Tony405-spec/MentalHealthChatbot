name: "CodeQL Advanced - Mindful Support"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '32 5 * * 3'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: java-kotlin
          build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ============================================
    # SET UP JAVA ENVIRONMENT
    # ============================================
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ============================================
    # SET UP ANDROID SDK
    # ============================================
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    # ============================================
    # FIX GRADLE WRAPER PERMISSIONS
    # ============================================
    - name: Fix Gradle Wrapper Permissions
      run: |
        ls -la gradlew
        chmod +x gradlew
        ls -la gradle/wrapper/
        # Ensure the wrapper JAR exists
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          echo "Missing gradle-wrapper.jar - downloading..."
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
        fi
        # Ensure properties file exists
        if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
          echo "Missing gradle-wrapper.properties - creating..."
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
        fi

    # ============================================
    # INITIALIZE CODEQL
    # ============================================
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: security-extended,security-and-quality
        config: |
          paths-ignore:
            - '**/build/**'
            - '**/generated/**'
            - '**/test/**'
            - '**/androidTest/**'

    # ============================================
    # BUILD ANDROID APP
    # ============================================
    - name: Build Android App
      run: |
        # Remove any local Java home setting
        if [ -f gradle.properties ]; then
          sed -i '/org.gradle.java.home/d' gradle.properties
        fi
        # Show current directory structure
        echo "Current directory: $(pwd)"
        ls -la
        ls -la gradle/wrapper/
        # Build the app
        ./gradlew assembleDebug --no-daemon --stacktrace
        echo "✅ Android Debug APK built successfully"

    # ============================================
    # UPLOAD APK AS ARTIFACT (Optional - for debugging)
    # ============================================
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7

    # ============================================
    # PERFORM CODEQL ANALYSIS
    # ============================================
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"
