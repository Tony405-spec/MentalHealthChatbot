# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.

name: "CodeQL Advanced - Mindful Support"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '32 5 * * 3'  # Weekly: Wednesday at 5:32 AM UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: java-kotlin
          build-mode: autobuild  # ⬅️ CHANGED: Auto-detects Android builds
        - language: javascript-typescript
          build-mode: none
        - language: actions
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ============================================
    # ANDROID BUILD ENVIRONMENT SETUP
    # ============================================
    - name: Set up JDK 17
      if: matrix.language == 'java-kotlin'
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      if: matrix.language == 'java-kotlin'
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      if: matrix.language == 'java-kotlin'
      run: chmod +x gradlew

    # ============================================
    # CODEQL INITIALIZATION
    # ============================================
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: security-extended,security-and-quality
        config: |
          paths-ignore:
            - '**/build/**'
            - '**/generated/**'
            - '**/test/**'
            - '**/androidTest/**'

    # ============================================
    # BUILD ANDROID APPLICATION
    # ============================================
    - name: Build Android App (Debug)
      if: matrix.language == 'java-kotlin' && matrix.build-mode == 'autobuild'
      run: |
        ./gradlew assembleDebug --no-daemon
        echo "✅ Android Debug APK built successfully"

    - name: Build Android App (Release)
      if: matrix.language == 'java-kotlin' && matrix.build-mode == 'manual'
      run: |
        ./gradlew assembleRelease --no-daemon
        echo "✅ Android Release APK built successfully"

    # ============================================
    # RUN CODEQL ANALYSIS
    # ============================================
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"
        output: codeql-results
        upload: true

    # ============================================
    # UPLOAD SARIF RESULTS (Optional)
    # ============================================
    - name: Upload SARIF Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: codeql-sarif-${{ matrix.language }}
        path: codeql-results
        retention-days: 30
