name: "CodeQL Advanced - Mindful Support"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '32 5 * * 3'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: java-kotlin
          build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ============================================
    # SET UP JAVA ENVIRONMENT
    # ============================================
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ============================================
    # SET UP ANDROID SDK
    # ============================================
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    # ============================================
    # DEBUG: SHOW REPOSITORY STRUCTURE
    # ============================================
    - name: Debug - Show Repository Structure
      run: |
        echo "=== Current Directory ==="
        pwd
        echo ""
        echo "=== Root Directory Contents ==="
        ls -la
        echo ""
        echo "=== Gradle Wrapper Directory ==="
        ls -la gradle/wrapper/ || echo "gradle/wrapper/ not found!"
        echo ""
        echo "=== Check gradlew ==="
        file gradlew || echo "gradlew not found!"
        echo ""
        echo "=== Check gradle.properties ==="
        cat gradle.properties || echo "gradle.properties not found!"
        echo ""
        echo "=== Check settings.gradle ==="
        cat settings.gradle || echo "settings.gradle not found!"
        echo ""
        echo "=== Check app/build.gradle ==="
        cat app/build.gradle || echo "app/build.gradle not found!"

    # ============================================
    # FIX GRADLE WRAPER PERMISSIONS
    # ============================================
    - name: Fix Gradle Wrapper Permissions
      run: |
        chmod +x gradlew
        # Ensure the wrapper JAR exists
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          echo "⚠️ Missing gradle-wrapper.jar - downloading..."
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
        fi
        # Ensure properties file exists
        if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
          echo "⚠️ Missing gradle-wrapper.properties - creating..."
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
        fi
        echo "✅ Wrapper files ready"

    # ============================================
    # TEST GRADLE WRAPER
    # ============================================
    - name: Test Gradle Wrapper
      run: |
        ./gradlew --version || echo "❌ Gradle wrapper test failed"

    # ============================================
    # INITIALIZE CODEQL
    # ============================================
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: security-extended,security-and-quality
        config: |
          paths-ignore:
            - '**/build/**'
            - '**/generated/**'
            - '**/test/**'
            - '**/androidTest/**'

    # ============================================
    # BUILD ANDROID APP WITH FULL LOGGING
    # ============================================
    - name: Build Android App
      run: |
        # Remove any local Java home setting
        if [ -f gradle.properties ]; then
          sed -i '/org.gradle.java.home/d' gradle.properties
        fi
        
        # Build with full logging
        echo "🔄 Starting build..."
        ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log
        
        # Check if build succeeded
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "✅ APK built successfully!"
          ls -la app/build/outputs/apk/debug/
        else
          echo "❌ APK not found. Build failed."
          exit 1
        fi

    # ============================================
    # UPLOAD APK AS ARTIFACT
    # ============================================
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7

    # ============================================
    # PERFORM CODEQL ANALYSIS
    # ============================================
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"
